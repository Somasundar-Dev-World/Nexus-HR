<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <img src="assets/logo.png" alt="Nexus HR Logo" class="brand-logo" />
      <h2>Nexus HR</h2>
    </div>
    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <span class="icon">📊</span> Dashboard
      </a>
      <a routerLink="/employees" routerLinkActive="active" class="nav-item">
        <span class="icon">👥</span> Employees
      </a>
      <a routerLink="/departments" routerLinkActive="active" class="nav-item">
        <span class="icon">🏢</span> Departments
      </a>
      <a routerLink="/add" routerLinkActive="active" class="nav-item">
        <span class="icon">➕</span> Add Employee
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <div class="search-bar">
        <input type="text" placeholder="Search everywhere..." class="search-input">
      </div>
      <div class="user-profile">
        <div class="avatar">R</div>
        <div class="user-info">
          <span class="name">Admin Rekha</span>
          <span class="role">System Administrator</span>
        </div>
      </div>
    </header>

    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
