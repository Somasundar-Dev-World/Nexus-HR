<div class="container" style="max-width: 600px; padding-top: 2rem;">
  <div class="flex-between mb-2">
    <div>
      <h1 class="font-bold text-main">Profile Settings</h1>
      <p class="text-sm text-muted">Manage your account details and password.</p>
    </div>
  </div>

  <div class="card form-card">
    @if (errorMsg) {
      <div class="alert alert-danger mb-2" style="background: #fee2e2; color: var(--danger); padding: 0.75rem; border-radius: var(--radius-md); font-size: 0.875rem;">
        {{ errorMsg }}
      </div>
    }
    
    @if (successMsg) {
      <div class="alert mb-2" style="background: #dcfce7; color: var(--primary); padding: 0.75rem; border-radius: var(--radius-md); font-size: 0.875rem;">
        {{ successMsg }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #profileForm="ngForm" class="grid-form" style="display: flex; flex-direction: column; gap: 1rem;">
      <div class="form-group mb-1">
        <label class="form-label">Username (Read-Only)</label>
        <input type="text" class="form-control" name="username" [ngModel]="profile.username" disabled style="opacity: 0.7;">
      </div>

      <div class="form-group mb-1">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" name="name" [(ngModel)]="profile.name" required>
      </div>
      
      <div class="form-group mb-2">
        <label class="form-label">New Password</label>
        <input type="password" class="form-control" name="password" [(ngModel)]="profile.password" placeholder="Leave blank to keep unchanged" minlength="6">
        <p class="text-xs text-muted mt-1">Must be at least 6 characters if changing.</p>
      </div>
      
      <div style="display: flex; justify-content: flex-end;">
        <button type="submit" class="btn btn-primary" [disabled]="profileForm.invalid || isLoading">
          {{ isLoading ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>
    </form>
  </div>
</div>
