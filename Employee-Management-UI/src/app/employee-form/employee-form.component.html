<div class="page-header">
  <div>
    <h1 class="page-title">{{ isEditMode ? 'Edit Employee' : 'Add New Employee' }}</h1>
    <p class="page-subtitle">{{ isEditMode ? 'Modify existing employee details below.' : 'Fill in the details to create a new employee record.' }}</p>
  </div>
  <button class="btn btn-outline" routerLink="/employees">
    Cancel & Back
  </button>
</div>

<div class="form-layout">
  <div class="card form-card">
    <h3>Personal Information</h3>
    @if (errorMessage) {
      <div class="alert-danger">{{ errorMessage }}</div>
    }
    <form (ngSubmit)="saveEmployee()">
      <div class="form-row">
        <div class="form-group flex-1">
          <label class="form-label">First Name</label>
          <input type="text" class="form-control" name="firstName" [(ngModel)]="employee.firstName" required placeholder="e.g. Jane">
        </div>
        <div class="form-group flex-1">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control" name="lastName" [(ngModel)]="employee.lastName" required placeholder="e.g. Doe">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" name="email" [(ngModel)]="employee.email" required placeholder="jane.doe&#64;example.com">
      </div>
      
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-control" name="phone" [(ngModel)]="employee.phone" placeholder="+1 (555) 000-0000">
      </div>

      <hr class="divider">

      <h3>Employment Status</h3>
      
      <div class="form-row">
        <div class="form-group flex-1">
          <label class="form-label">Department</label>
          <select class="form-control" name="department" [(ngModel)]="employee.department.id">
            @for (dept of departments; track dept.id) {
              <option [value]="dept.id">{{ dept.name }}</option>
            }
          </select>
        </div>
        <div class="form-group flex-1">
          <label class="form-label">Job Title</label>
          <input type="text" class="form-control" name="jobTitle" [(ngModel)]="employee.jobTitle" required placeholder="e.g. Frontend Developer">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group flex-1">
          <label class="form-label">Status</label>
          <select class="form-control" name="status" [(ngModel)]="employee.status">
            <option value="Active">Active</option>
            <option value="On Leave">On Leave</option>
            <option value="Terminated">Terminated</option>
          </select>
        </div>
        <div class="form-group flex-1">
          <label class="form-label">System Role</label>
          <select class="form-control" name="role" [(ngModel)]="employee.role">
            <option value="Member">Member</option>
            <option value="Admin">Admin</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">{{ isEditMode ? 'Update Details' : 'Save Employee' }}</button>
      </div>
    </form>
  </div>
</div>
