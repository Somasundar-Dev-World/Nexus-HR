<div class="page-header">
  <div>
    <h1 class="page-title">{{ isEditMode ? 'Edit Department' : 'Add New Department' }}</h1>
    <p class="page-subtitle">Fill in the details for routing and organization mapping.</p>
  </div>
  <button class="btn btn-outline" routerLink="/departments">Cancel & Back</button>
</div>

<div class="form-layout">
  <div class="card form-card">
    <h3>Department Details</h3>
    @if (errorMessage) {
      <div class="alert-danger">{{ errorMessage }}</div>
    }
    <form (ngSubmit)="saveDepartment()">
      
      <div class="form-group">
        <label class="form-label">Department Name</label>
        <input type="text" class="form-control" name="name" [(ngModel)]="department.name" required placeholder="e.g. Information Technology">
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-control" name="description" [(ngModel)]="department.description" rows="4" placeholder="Brief outline of operations..."></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">{{ isEditMode ? 'Update' : 'Save Department' }}</button>
      </div>
    </form>
  </div>
</div>
