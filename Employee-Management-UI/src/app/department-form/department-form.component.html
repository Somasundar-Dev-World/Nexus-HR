<div class="page-header">
  <div>
    <h1 class="page-title">{{ isEditMode ? 'Edit Department' : 'Add New Department' }}</h1>
    <p class="page-subtitle">Fill in the details for routing and organization mapping.</p>
  </div>
  <button class="btn btn-outline" routerLink="/departments">Cancel & Back</button>
</div>

<div class="form-layout" style="display: grid; grid-template-columns: minmax(0, 800px); justify-content: start;">
  <div class="card" style="padding: 2rem;">
    <h3 style="margin-top: 0; margin-bottom: 1.5rem; font-size: 1.125rem; font-weight: 600;">Department Details</h3>
    <form (ngSubmit)="saveDepartment()">
      
      <div class="form-group" style="margin-bottom: 1.25rem;">
        <label class="form-label" style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-main);">Department Name</label>
        <input type="text" class="form-control" name="name" [(ngModel)]="department.name" required placeholder="e.g. Information Technology" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 0.5rem;">
      </div>

      <div class="form-group" style="margin-bottom: 1.25rem;">
        <label class="form-label" style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-main);">Description</label>
        <textarea class="form-control" name="description" [(ngModel)]="department.description" rows="4" placeholder="Brief outline of operations..." style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 0.5rem; font-family: inherit; font-size: 0.875rem; resize: vertical;"></textarea>
      </div>

      <div class="form-actions" style="margin-top: 2rem; display: flex; justify-content: flex-end;">
        <button type="submit" class="btn btn-primary">{{ isEditMode ? 'Update' : 'Save Department' }}</button>
      </div>
    </form>
  </div>
</div>
