<div class="auth-container">
  <div class="auth-box card">
    <div class="text-center mb-2">
      <div class="logo">ET</div>
      <h2 class="font-bold">Create an Account</h2>
      <p class="text-sm text-muted">Join Expense Tracker and manage your wealth</p>
    </div>

    @if (error) {
      <div class="alert alert-danger mb-2" style="background: #fee2e2; color: var(--danger); padding: 0.75rem; border-radius: var(--radius-md); font-size: 0.875rem;">
        {{ error }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" name="name" [(ngModel)]="profile.name" required>
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" name="username" [(ngModel)]="profile.username" required>
      </div>
      
      <div class="form-group mb-2">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" [(ngModel)]="profile.password" required minlength="6">
      </div>
      
      <button type="submit" class="btn btn-primary w-100" [disabled]="registerForm.invalid || isLoading" style="width: 100%; justify-content: center; padding: 0.75rem;">
        {{ isLoading ? 'Creating Account...' : 'Sign Up' }}
      </button>
    </form>
    
    <div class="text-center mt-2">
      <p class="text-sm text-muted">Already have an account? <a routerLink="/login" style="color: var(--primary); font-weight: 500; text-decoration: none;">Sign in</a>.</p>
    </div>
  </div>
</div>
