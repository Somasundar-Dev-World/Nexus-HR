<div class="docs-container animate-fade-up">
  
  <div class="docs-header">
    <div class="docs-icon">📖</div>
    <div class="docs-title-area">
      <h1>OmniTracker Platform Engineering</h1>
      <p class="docs-subtitle">Technical Details & Implementation Specifications</p>
    </div>
    
    <div class="docs-actions">
      <button class="btn btn-outline" routerLink="/track">← Back to App</button>
    </div>
  </div>

  <div class="docs-layout">
    <!-- Sidebar -->
    <aside class="docs-sidebar">
      <h3>Context Modules</h3>
      <nav class="docs-nav">
        <a routerLink="/docs" [queryParams]="{topic: 'default'}" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Platform Architecture</a>
        <a routerLink="/docs" [queryParams]="{topic: 'track'}" routerLinkActive="active">Angular 17 UI</a>
        <a routerLink="/docs" [queryParams]="{topic: 'backend'}" routerLinkActive="active">Spring Boot & API</a>
        <a routerLink="/docs" [queryParams]="{topic: 'database'}" routerLinkActive="active">PostgreSQL & JSONB</a>
        <a routerLink="/docs" [queryParams]="{topic: 'deep-research'}" routerLinkActive="active">AI & LLM (Gemini)</a>
        <a routerLink="/docs" [queryParams]="{topic: 'profile'}" routerLinkActive="active">Security (JWT / OAuth)</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <article class="docs-content">
      <div *ngIf="isLoading" class="page-loading">
        <div class="loader"></div>
        <p>Fetching 10,000+ line technical specification...</p>
      </div>
      <div *ngIf="!isLoading" class="markdown-body animate-fade-down" [innerHTML]="renderedHtml"></div>
    </article>
  </div>
</div>
