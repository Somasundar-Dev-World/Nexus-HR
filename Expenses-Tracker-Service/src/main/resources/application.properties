spring.application.name=expenses-tracker
server.port=${PORT:8081}

spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/expensesdb;AUTO_SERVER=TRUE}
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${DATABASE_DIALECT:org.hibernate.dialect.H2Dialect}

spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.show-sql=true

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
