spring.application.name=expenses-tracker
server.port=${PORT:8081}

# Database - uses PostgreSQL in production (DATABASE_URL set on Render), H2 locally
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:expensesdb}
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${DATABASE_DIALECT:org.hibernate.dialect.H2Dialect}

spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.show-sql=false

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Increase request body limits for bulk uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=10MB
server.tomcat.max-http-post-size=10MB
